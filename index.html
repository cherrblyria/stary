<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link href="./css/tailwind.css" rel="stylesheet" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Quicksand:wght@300..700&display=swap"
      rel="stylesheet"
    />
    <link rel="icon" href="assets/favicon.ico" />

    <title>Stary</title>
  </head>

  <body
    class="font-sans bg-mauve-300 dark:bg-mauve-900 text-mauve-700 dark:text-mauve-300 text-shadow-lg h-screen content-center text-center"
  >
    <div class="flex justify-center">
      <div class="md:p-10 md:pl-15 lg:p-15">
        <picture>
          <source
            srcset="./assets/dark.jpg"
            media="(prefers-color-scheme: dark)"
          />
          <img
            src="./assets/light.jpg"
            class="rounded-3xl shadow-2xl size-0 md:w-96 h-auto"
            alt=":3"
          />
        </picture>
      </div>

      <div class="md:pl-10 md:pr-15 flex-row content-center">
        <div class="font-serif text-7xl w-lg pb-15 leading-loose self-end">
          Where to go?
        </div>

        <nav id="bookmark-list" class="text-xl gap-10 flex justify-center">
          <div>
            <div class="font-extrabold">Group</div>
            <div>
              <a href="https://some.site/">Link</a>
            </div>
            <!-- ... -->
          </div>
          <!-- ... -->
        </nav>
      </div>
    </div>

    <script src="./js/script.js"></script>
  </body>
</html>
