<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link href="./css/tailwind.css" rel="stylesheet" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Quicksand:wght@300..700&display=swap"
      rel="stylesheet"
    />

    <title>Stary</title>
  </head>

  <body
    class="font-sans bg-mauve-300 dark:bg-mauve-900 text-mauve-700 dark:text-mauve-300 text-shadow-lg h-screen content-center text-center outline-none"
  >
    <div class="flex justify-center">
      <div class="md:p-10 md:pl-15 lg:p-15">
        <picture>
          <source
            srcset="./assets/dark.jpg"
            media="(prefers-color-scheme: dark)"
          />
          <img
            src="./assets/light.jpg"
            class="rounded-3xl shadow-2xl size-0 md:w-96 h-auto"
            alt=":3"
          />
        </picture>
      </div>

      <div class="md:pl-10 md:pr-15 flex-row content-center">
        <div class="font-serif text-7xl w-lg pb-15 leading-loose self-end">
          Where to go?
        </div>

        <nav id="bookmark-list" class="text-xl gap-10 flex justify-center">
          <div>
            <div class="font-extrabold">Group</div>
            <div>
              <a href="https://some.site/">Link</a>
            </div>
            <!-- ... -->
          </div>
          <!-- ... -->
        </nav>
      </div>
    </div>

    <button
      class="bottom-2 right-3 font-mono fixed cursor-pointer"
      onclick="settingModal.showModal()"
    >
      ⚙️
    </button>

    <dialog
      id="settingModal"
      class="bg-mauve-300 text-shadow-lg shadow-2xl rounded-2xl p-2 backdrop:bg-black/50 dark:bg-mauve-900 m-10 text-olive-50 place-self-end"
    >
      <button
        onclick="settingModal.close()"
        class="bg-red-500 hover:bg-red-400 w-5 h-5 font-mono right-2 absolute rounded-full"
      >
        X
      </button>

      <div class="flex flex-col">
        <h1
          class="text-3xl text-mauve-700 leading-loose font-serif px-15 -mt-4"
        >
          Settings
        </h1>

        <div class="gap-3 flex justify-end-safe">
          <button
            onclick="saveNewLink()"
            class="dark:bg-mauve-700 bg-mauve-500 hover:bg-mauve-400 dark:hover:bg-mauve-600 px-1.5 font-mono rounded-full"
          >
            save
          </button>
        </div>
      </div>
    </dialog>

    <script src="./js/script.js"></script>
  </body>
</html>
